name: Run AI Project

on: push

jobs:
  run-project:
    runs-on: ubuntu-latest

    env:
      HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py
